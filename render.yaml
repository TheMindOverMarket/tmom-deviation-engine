services:
  - type: web
    name: tmom-deviation-engine
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    plan: starter
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: TMOM_BACKEND_BASE_URL
        value: https://tmom-app-backend.onrender.com
      - key: TMOM_BACKEND_WS_BASE_URL
        value: wss://tmom-app-backend.onrender.com
      - key: TMOM_RULE_ENGINE_BASE_URL
        value: https://rule-engine-rcg9.onrender.com
      - key: DEFAULT_EXPIRY_WINDOW
        value: "60.0"
      - key: LATE_ENTRY_GRACE_MS
        value: "30000"
